services:
  - type: web
    name: gzstats-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RIOT_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gzstats-db
          property: connectionString

databases:
  - name: gzstats-db
    databaseName: gzstats
    user: gzstats
