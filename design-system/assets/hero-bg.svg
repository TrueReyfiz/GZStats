<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b10"></stop>
      <stop offset="0.5" stop-color="#0d1726"></stop>
      <stop offset="1" stop-color="#080b10"></stop>
    </linearGradient>
    <radialGradient id="hero-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.25"></stop>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"></path>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#hero-bg)"></rect>
  <rect width="1200" height="320" fill="url(#grid)"></rect>
  <ellipse cx="600" cy="160" rx="500" ry="180" fill="url(#hero-glow)"></ellipse>

  
  <g stroke="#22d3ee" stroke-width="1" stroke-opacity="0.12">
    <line x1="0" y1="0" x2="320" y2="320"></line>
    <line x1="80" y1="0" x2="400" y2="320"></line>
    <line x1="800" y1="0" x2="1120" y2="320"></line>
    <line x1="880" y1="0" x2="1200" y2="320"></line>
  </g>

  
  <g stroke="#22d3ee" stroke-width="2" fill="none">
    <path d="M 20 50 L 20 20 L 50 20"></path>
    <path d="M 1150 20 L 1180 20 L 1180 50"></path>
    <path d="M 1180 270 L 1180 300 L 1150 300"></path>
    <path d="M 50 300 L 20 300 L 20 270"></path>
  </g>

  
  <g stroke="#fbbf24" stroke-width="1" stroke-opacity="0.5">
    <line x1="600" y1="140" x2="600" y2="180"></line>
    <line x1="580" y1="160" x2="620" y2="160"></line>
  </g>
  <circle cx="600" cy="160" r="6" fill="none" stroke="#fbbf24" stroke-opacity="0.6"></circle>
</svg>